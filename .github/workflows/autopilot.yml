name: Copilot Autopilot

on:
  workflow_dispatch:
    inputs:
      instruction:
        description: "Autopilot instruction"
        required: true
        type: string
      allow_fallback:
        description: "Allow deterministic fallback if Copilot fails"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  autopilot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare autopilot branch
        id: prep_branch
        run: |
          set -euo pipefail
          branch="autopilot-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git checkout -b "$branch"
          echo "work_branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Copilot CLI preflight
        run: |
          set -euxo pipefail
          copilot --version
          copilot --help

      - name: Validate Copilot token secret
        id: token_check
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${COPILOT_GITHUB_TOKEN:-}" ]; then
            echo "token_available=false" >> "$GITHUB_OUTPUT"
          else
            echo "token_available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Copilot Autopilot
        id: copilot
        if: ${{ steps.token_check.outputs.token_available == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          copilot --autopilot -p "${{ inputs.instruction }}" --allow-all

      - name: Ensure PR exists for Copilot branch
        if: ${{ steps.copilot.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ secrets.PR_CREATOR_TOKEN || secrets.COPILOT_GITHUB_TOKEN }}
          GH_TOKEN_FALLBACK: ${{ github.token }}
          INSTRUCTION: ${{ inputs.instruction }}
          WORK_BRANCH: ${{ steps.prep_branch.outputs.work_branch }}
        run: |
          set -euo pipefail

          base_branch="${GITHUB_REF_NAME}"
          current_branch="$(git rev-parse --abbrev-ref HEAD)"

          if [ "$current_branch" = "$base_branch" ] && [ -n "${WORK_BRANCH:-}" ]; then
            git checkout "$WORK_BRANCH" || true
            current_branch="$(git rev-parse --abbrev-ref HEAD)"
          fi

          if [ "$current_branch" = "$base_branch" ]; then
            echo "Copilot finished on base branch ($base_branch); no feature branch detected for PR creation."
            exit 1
          fi

          # Ensure the branch is present remotely before creating a PR.
          git push -u origin "$current_branch" >/dev/null 2>&1 || true

          existing_count="$(gh pr list --head "$current_branch" --base "$base_branch" --state open --json number --jq 'length')"
          if [ "$existing_count" != "0" ]; then
            echo "Open PR already exists for branch $current_branch."
            exit 0
          fi

          title="Autopilot: ${INSTRUCTION}"
          if [ ${#title} -gt 120 ]; then
            title="${title:0:117}..."
          fi

          body_file="/tmp/autopilot_pr_body.txt"
          {
            echo "Autopilot completed but PR was not created by Copilot token."
            echo
            echo "Instruction:"
            echo
            echo '```'
            echo "$INSTRUCTION"
            echo '```'
          } > "$body_file"

          body_content="$(cat "$body_file")"
          if gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/pulls" \
            -f title="$title" \
            -f head="$current_branch" \
            -f base="$base_branch" \
            -f body="$body_content" >/tmp/autopilot_pr_create.json 2>/tmp/autopilot_pr_create.err; then
            echo "PR creation succeeded with primary token."
          else
            echo "Primary token failed to create PR. Trying github.token fallback."
            cat /tmp/autopilot_pr_create.err || true

            if ! GH_TOKEN="$GH_TOKEN_FALLBACK" gh api \
              --method POST \
              "repos/${GITHUB_REPOSITORY}/pulls" \
              -f title="$title" \
              -f head="$current_branch" \
              -f base="$base_branch" \
              -f body="$body_content" >/tmp/autopilot_pr_create.json 2>/tmp/autopilot_pr_create.err; then
              echo "PR creation failed via both primary token and github.token fallback."
              cat /tmp/autopilot_pr_create.err || true
              echo "Grant token permissions (Contents: Write, Pull requests: Write) and ensure repo setting allows GitHub Actions to create PRs."
              exit 1
            fi

            echo "PR creation succeeded with github.token fallback."
          fi

          pr_url="$(jq -r '.html_url // empty' /tmp/autopilot_pr_create.json 2>/dev/null || true)"
          if [ -n "$pr_url" ]; then
            echo "PR created: $pr_url"
          else
            echo "PR created, but could not parse PR URL from API response."
            cat /tmp/autopilot_pr_create.json || true
          fi

      - name: Fail when Copilot token is missing
        if: ${{ steps.token_check.outputs.token_available != 'true' }}
        run: |
          echo "COPILOT_GITHUB_TOKEN is missing."
          echo "Set repo secret COPILOT_GITHUB_TOKEN with a token that has Copilot Requests permission."
          exit 1

      - name: Fallback scripted PR
        if: ${{ inputs.allow_fallback && failure() }}
        env:
          GH_TOKEN: ${{ secrets.PR_CREATOR_TOKEN || github.token }}
          INSTRUCTION: ${{ inputs.instruction }}
          REPO: ${{ github.repository }}
        run: |
          set -euxo pipefail

          branch="autopilot-fallback-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"

          cat > src/subtract.js <<'EOF'
          export function subtract(a, b) {
            return a - b;
          }
          EOF

          cat > test/subtract.test.js <<'EOF'
          import test from "node:test";
          import assert from "node:assert/strict";
          import { subtract } from "../src/subtract.js";

          test("subtract subtracts two numbers", () => {
            assert.equal(subtract(5, 3), 2);
          });
          EOF

          npm test

          git add src/subtract.js test/subtract.test.js
          git commit -m "Fallback autopilot change for run ${GITHUB_RUN_ID}"
          git push origin "$branch"

          body_file="/tmp/pr_body.txt"
          {
            echo "Fallback PR generated because Copilot CLI token/permission is unavailable in Actions."
            echo
            echo "Original instruction:"
            echo
            echo '```'
            echo "$INSTRUCTION"
            echo '```'
          } > "$body_file"

          if gh pr create \
            --base "${GITHUB_REF_NAME}" \
            --head "$branch" \
            --title "Fallback autopilot: add subtract function with tests" \
            --body-file "$body_file"; then
            echo "Fallback PR created successfully."
          else
            echo "Automated PR creation is blocked by repository/org policy for this token."
            echo "Create PR manually at: https://github.com/${REPO}/pull/new/${branch}"
            exit 1
          fi
