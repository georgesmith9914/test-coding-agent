name: Copilot Autopilot

on:
  workflow_dispatch:
    inputs:
      instruction:
        description: "Autopilot instruction"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  autopilot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Copilot CLI preflight
        run: |
          set -euxo pipefail
          copilot --version
          copilot --help

      - name: Validate Copilot token secret
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${COPILOT_GITHUB_TOKEN:-}" ]; then
            echo "Missing required repository secret: COPILOT_GITHUB_TOKEN"
            echo "Create a Fine-Grained PAT with Copilot Requests permission and add it as COPILOT_GITHUB_TOKEN."
            exit 1
          fi

      - name: Run Copilot Autopilot
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          copilot --autopilot -p "${{ inputs.instruction }}" --allow-all
